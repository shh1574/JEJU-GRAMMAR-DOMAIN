      }

      function highlight(s, needle) {
        if (!needle) return esc(s);
        const lo = s.toLowerCase();
        const n = needle.toLowerCase();
        let out = '', i = 0;
        while (true) {
          const k = lo.indexOf(n, i);
          if (k < 0) { out += esc(s.slice(i)); break; }
          out += esc(s.slice(i, k)) + '<mark>' + esc(s.slice(k, k+n.length)) + '</mark>';
          i = k + n.length;
        }
        return out;
      }

      function compare(a, b, key) {
        if (key === 'year') {
          const ya = parseInt(a.year, 10), yb = parseInt(b.year, 10);
          if (!isNaN(ya) && !isNaN(yb) && ya !== yb) return ya - yb;
          if (isNaN(ya) && !isNaN(yb)) return 1;
          if (!isNaN(ya) && isNaN(yb)) return -1;
        }
        const va = (a[key] || '').toString();
        const vb = (b[key] || '').toString();
        return va.localeCompare(vb, 'ko');
      }

      function render() {
        const needle = q.value.trim();
        const filtered = needle
          ? rows.filter(r =>
              r.author.includes(needle) ||
              r.title.includes(needle) ||
              r.journal.includes(needle))
          : rows.slice();
        filtered.sort((a, b) => sortDir * compare(a, b, sortKey));
        tb.innerHTML = filtered.map(r =>
          '<tr>' +
            '<td class="author">' + highlight(r.author, needle) + '</td>' +
            '<td class="year">' + esc(r.year) + '</td>' +
            '<td class="title">' + highlight(r.title, needle) + '</td>' +
            '<td class="journal">' + highlight(r.journal, needle) + '</td>' +
            '<td class="kind">' + esc(r.kind) + '</td>' +
          '</tr>'
        ).join('');
        count.textContent = filtered.length + ' / ' + rows.length + '편';
        ths.forEach(th => {
          const a = th.querySelector('.arrow');
          if (th.dataset.key === sortKey) a.textContent = sortDir === 1 ? '▲' : '▼';
          else a.textContent = '';
        });
      }

      ths.forEach(th => th.addEventListener('click', () => {
        const k = th.dataset.key;
        if (k === sortKey) sortDir = -sortDir;
        else { sortKey = k; sortDir = 1; }
        render();
      }));

      q.addEventListener('input', render);
      render();
    })();
  </script>
</body>
</html>
